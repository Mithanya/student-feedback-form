<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>
</head>

<body>

<div style="width:350px; margin:80px auto; padding:20px; border:1px solid #ccc; border-radius:8px;">

    <h2 style="text-align:center;">Student Feedback</h2>

    <form>

        <label>Name</label><br>
        <input type="text" placeholder="Enter your name" 
        style="width:100%; padding:6px;"><br><br>

        <label>Email</label><br>
        <input type="email" placeholder="Enter your email" 
        style="width:100%; padding:6px;"><br><br>

        <label>Department</label><br>
        <select style="width:100%; padding:6px;">
            <option>IT</option>
            <option>CSE</option>
            <option>ECE</option>
        </select><br><br>

        <label>Rate the class</label><br>
        <input type="radio" name="rate"> Good
        <input type="radio" name="rate"> Average
        <input type="radio" name="rate"> Excellent<br><br>

        <label>Feedback</label><br>
        <textarea rows="3" style="width:100%; padding:6px;"></textarea><br><br>

        <input type="submit" value="Submit"
        style="width:100%; padding:8px; background:#333; color:white; border:none;">

    </form>

</div>

</body>
</html>
